services:
  - type: web
    name: wealth-advisor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn wealthsite.wsgi:application --log-file -
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: wealth-advisor.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://wealth-advisor.onrender.com
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: wealth-advisor-db
          property: connectionString

databases:
  - name: wealth-advisor-db
    plan: free
